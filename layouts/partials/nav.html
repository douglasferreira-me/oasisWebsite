<header class="site-header"><div class="container nav-wrap">
  <a class="brand" href="{{ .Site.Home.RelPermalink }}" aria-label="OASIS — UFRJ">
    <img class="brand-light" src="{{ "images/oasis/logo-long-light.png" | relURL }}" alt="OASIS — Observatório de Algoritmos e Sistemas de Informação com Impacto Social" width="2390" height="1127">
    <img class="brand-dark" src="{{ "images/oasis/logo-long-dark.png" | relURL }}" alt="OASIS — Observatório de Algoritmos e Sistemas de Informação com Impacto Social" width="2390" height="1127">
  </a>
  <nav class="nav-links" data-nav-links aria-label="Principal">{{ range .Site.Menus.main }}<a href="{{ .URL }}" {{ if $.IsMenuCurrent "main" . }}aria-current="page"{{ end }}>{{ .Name }}</a>{{ end }}</nav>
  <div class="nav-tools">
    <div class="social-links" aria-label="{{ .Site.Params.socialLabel }}">
      <a href="{{ hugo.Data.social.linkedin.url }}" target="_blank" rel="me noopener noreferrer" aria-label="{{ hugo.Data.social.linkedin.label }}" title="{{ hugo.Data.social.linkedin.label }}"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5.2 7.3A2.2 2.2 0 1 0 5.2 3a2.2 2.2 0 0 0 0 4.3ZM3.3 21h3.8V9H3.3v12ZM9.4 9v12h3.8v-6.7c0-1.8.3-3.5 2.5-3.5 2.1 0 2.2 2 2.2 3.6V21h3.8v-7.4c0-3.6-.8-6.4-5-6.4-2 0-3.4 1.1-4 2.1h-.1V9H9.4Z"/></svg></a>
      <a href="{{ hugo.Data.social.instagram.url }}" target="_blank" rel="me noopener noreferrer" aria-label="{{ hugo.Data.social.instagram.label }}" title="{{ hugo.Data.social.instagram.label }}"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill-rule="evenodd" d="M7.4 2h9.2A5.4 5.4 0 0 1 22 7.4v9.2a5.4 5.4 0 0 1-5.4 5.4H7.4A5.4 5.4 0 0 1 2 16.6V7.4A5.4 5.4 0 0 1 7.4 2Zm-.2 2A3.2 3.2 0 0 0 4 7.2v9.6A3.2 3.2 0 0 0 7.2 20h9.6a3.2 3.2 0 0 0 3.2-3.2V7.2A3.2 3.2 0 0 0 16.8 4H7.2Zm10.1 1.5a1.3 1.3 0 1 1 0 2.6 1.3 1.3 0 0 1 0-2.6ZM12 7.1a4.9 4.9 0 1 1 0 9.8 4.9 4.9 0 0 1 0-9.8Zm0 2a2.9 2.9 0 1 0 0 5.8 2.9 2.9 0 0 0 0-5.8Z" clip-rule="evenodd"/></svg></a>
    </div>
    <details class="language"><summary aria-label="{{ .Site.Params.languageLabel }}">{{ upper .Language.Lang }}</summary><ul class="language-list">{{ range .AllTranslations }}<li><a href="{{ .RelPermalink }}" lang="{{ .Language.Locale }}">{{ .Language.Label }}</a></li>{{ end }}</ul></details>
    <button class="icon-button" type="button" data-theme-toggle aria-label="{{ .Site.Params.themeLabel }}" title="{{ .Site.Params.themeLabel }}">◐</button>
    <button class="menu-button" type="button" data-menu-toggle aria-expanded="false" aria-label="{{ .Site.Params.menuLabel }}">☰</button>
  </div>
</div></header>
